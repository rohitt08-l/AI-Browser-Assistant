<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      width: 340px;
      padding: 12px;
      background: #0f172a; /* dark blue */
      color: #e2e8f0;
    }

    h3 {
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #6366f1, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    select, textarea {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    textarea {
      height: 70px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #askBtn {
      background: linear-gradient(90deg, #6366f1, #22c55e);
      color: white;
    }

    #askBtn:hover {
      opacity: 0.9;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .actions button {
      flex: 1;
      background: #334155;
      color: white;
    }

    .actions button:hover {
      background: #475569;
    }

    #response {
      margin-top: 10px;
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
    }

    .loader {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

  </style>
</head>

<body>

<h3>AI Assistant</h3>

<select id="taskType">
  <option value="auto">Auto Detect</option>
  <option value="qa">Q&A</option>
  <option value="summarize">Summary</option>
  <option value="notes">Notes</option>
  <option value="generate_doc">Generate Document</option>
</select>

<textarea id="question" placeholder="Ask anything about this page..."></textarea>

<button id="askBtn">Run AI</button>

<div class="actions">
  <button id="copyBtn">Copy</button>
</div>

<div id="response"></div>

<script src="popup.js"></script>

</body>
</html>
